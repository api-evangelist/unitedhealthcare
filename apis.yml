features:
- name: Real-Time Eligibility Verification
  description: Verify UnitedHealthcare member eligibility and benefits in real time at the point of care, reducing claim denials
    and improving patient financial transparency.
- name: Claim Pre-Check
  description: Validate claims before submission to identify errors, missing authorizations, and billing issues that would
    cause denials, accelerating payment cycles.
- name: Prior Authorization Check
  description: Determine prior authorization requirements for procedures and check existing authorization status to streamline
    clinical workflows.
- name: FHIR R4 Patient Access
  description: CMS-mandated FHIR R4 APIs enabling patients and authorized applications to access claims history, coverage
    data, and clinical information.
- name: Provider Directory
  description: FHIR R4 Provider Directory implementing Da Vinci PDex Plan Net IG for searching UnitedHealthcare network providers,
    organizations, and locations.
- name: Drug Formulary
  description: FHIR-based formulary API providing drug coverage tier information, prior authorization requirements, and quantity
    limits for prescription medications.
- name: Claims Inquiry
  description: Real-time claim status inquiry returning payment details, denial reasons, adjustment codes, and explanation
    of benefits data.
useCases:
- name: Point-of-Care Eligibility
  description: Verify patient UnitedHealthcare coverage and benefits at check-in using the real-time eligibility API to collect
    accurate copays and reduce billing errors.
- name: Revenue Cycle Management
  description: Integrate claim pre-check and claim inquiry APIs into practice management systems to automate claim validation
    and track payment status.
- name: Prior Authorization Workflows
  description: Embed prior authorization checking in clinical workflows to immediately determine if approval is needed before
    scheduling procedures or prescribing medications.
- name: Patient Portal Integration
  description: Enable patient portals to display claims history, coverage details, and EOBs using the FHIR Patient Access
    API for transparent member engagement.
- name: Provider Search Applications
  description: Build provider search tools and care coordination apps using the FHIR Provider Directory API to find in-network
    physicians, specialists, and facilities.
- name: Formulary Management
  description: Integrate the Formulary API into EHR and e-prescribing workflows to check drug coverage tiers and authorization
    requirements at point of prescribing.
integrations:
- name: Epic Systems
  description: UnitedHealthcare APIs integrate with Epic EHR for real-time eligibility verification, prior authorization,
    and FHIR-based data exchange.
- name: Cerner/Oracle Health
  description: FHIR R4 Interoperability APIs integrate with Cerner for patient data access and provider directory services.
- name: Change Healthcare
  description: Provider APIs complement Change Healthcare clearinghouse services for comprehensive claims management and eligibility
    verification.
- name: Availity
  description: UnitedHealthcare participates in Availity's real-time eligibility and claims network providing additional access
    pathways for providers.
