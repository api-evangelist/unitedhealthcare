name: UnitedHealthcare
description: UnitedHealthcare is one of the largest health insurance providers in the United States, offering employer-sponsored
  health benefits, individual and family plans, Medicare and Medicaid plans, and managed care services. UnitedHealthcare provides
  APIs for healthcare providers through the UHC API Marketplace for eligibility verification, claims management, and prior
  authorization, and FHIR R4-compliant Interoperability APIs for patient data access and provider directory services per CMS
  mandates.
