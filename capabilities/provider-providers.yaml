naftiko: 1.0.0-alpha2
info:
  label: UnitedHealthcare Provider API — Providers
  description: 'UnitedHealthcare Provider API — Providers. 1 operations. Lead operation: UnitedHealthcare Provider Demographics.
    Self-contained Naftiko capability covering one Unitedhealthcare business surface.'
  tags:
  - Unitedhealthcare
  - Providers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITEDHEALTHCARE_API_KEY: UNITEDHEALTHCARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: provider-providers
    baseUri: https://api.uhcprovider.com
    description: UnitedHealthcare Provider API — Providers business capability. Self-contained, no shared references.
    resources:
    - name: providers-v1-demographics
      path: /providers/v1/demographics
      operations:
      - name: getproviderdemographics
        method: GET
        description: UnitedHealthcare Provider Demographics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: npi
          in: query
          type: string
          description: National Provider Identifier (NPI) for the provider
          required: true
        - name: state
          in: query
          type: string
          description: Two-letter state code to filter results
    authentication:
      type: bearer
      token: '{{env.UNITEDHEALTHCARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: provider-providers-rest
    port: 8080
    description: REST adapter for UnitedHealthcare Provider API — Providers. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/providers/v1/demographics
      name: providers-v1-demographics
      description: REST surface for providers-v1-demographics.
      operations:
      - method: GET
        name: getproviderdemographics
        description: UnitedHealthcare Provider Demographics
        call: provider-providers.getproviderdemographics
        with:
          npi: rest.npi
          state: rest.state
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provider-providers-mcp
    port: 9090
    transport: http
    description: MCP adapter for UnitedHealthcare Provider API — Providers. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: unitedhealthcare-provider-demographics
      description: UnitedHealthcare Provider Demographics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: provider-providers.getproviderdemographics
      with:
        npi: tools.npi
        state: tools.state
      outputParameters:
      - type: object
        mapping: $.
