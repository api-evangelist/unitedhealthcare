naftiko: 1.0.0-alpha2
info:
  label: UnitedHealthcare Interoperability API — Formulary
  description: 'UnitedHealthcare Interoperability API — Formulary. 1 operations. Lead operation: UnitedHealthcare List Formulary
    Medications. Self-contained Naftiko capability covering one Unitedhealthcare business surface.'
  tags:
  - Unitedhealthcare
  - Formulary
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITEDHEALTHCARE_API_KEY: UNITEDHEALTHCARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: interoperability-formulary
    baseUri: https://api.uhc.com/fhir/R4
    description: UnitedHealthcare Interoperability API — Formulary business capability. Self-contained, no shared references.
    resources:
    - name: MedicationKnowledge
      path: /MedicationKnowledge
      operations:
      - name: listformulary
        method: GET
        description: UnitedHealthcare List Formulary Medications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: RxNorm drug code
        - name: drug-name
          in: query
          type: string
          description: Drug name search string
        - name: tier
          in: query
          type: string
          description: Formulary tier filter
        - name: _count
          in: query
          type: integer
          description: Maximum number of results
    authentication:
      type: bearer
      token: '{{env.UNITEDHEALTHCARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: interoperability-formulary-rest
    port: 8080
    description: REST adapter for UnitedHealthcare Interoperability API — Formulary. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/medicationknowledge
      name: medicationknowledge
      description: REST surface for MedicationKnowledge.
      operations:
      - method: GET
        name: listformulary
        description: UnitedHealthcare List Formulary Medications
        call: interoperability-formulary.listformulary
        with:
          code: rest.code
          drug-name: rest.drug-name
          tier: rest.tier
          _count: rest._count
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: interoperability-formulary-mcp
    port: 9090
    transport: http
    description: MCP adapter for UnitedHealthcare Interoperability API — Formulary. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: unitedhealthcare-list-formulary-medications
      description: UnitedHealthcare List Formulary Medications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: interoperability-formulary.listformulary
      with:
        code: tools.code
        drug-name: tools.drug-name
        tier: tools.tier
        _count: tools._count
      outputParameters:
      - type: object
        mapping: $.
