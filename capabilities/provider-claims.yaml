naftiko: 1.0.0-alpha2
info:
  label: UnitedHealthcare Provider API — Claims
  description: 'UnitedHealthcare Provider API — Claims. 2 operations. Lead operation: UnitedHealthcare Real Claim Inquiry.
    Self-contained Naftiko capability covering one Unitedhealthcare business surface.'
  tags:
  - Unitedhealthcare
  - Claims
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITEDHEALTHCARE_API_KEY: UNITEDHEALTHCARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: provider-claims
    baseUri: https://api.uhcprovider.com
    description: UnitedHealthcare Provider API — Claims business capability. Self-contained, no shared references.
    resources:
    - name: claims-v1-inquiry
      path: /claims/v1/inquiry
      operations:
      - name: inquireclaim
        method: POST
        description: UnitedHealthcare Real Claim Inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: claims-v1-pre-check
      path: /claims/v1/pre-check
      operations:
      - name: claimprecheck
        method: POST
        description: UnitedHealthcare Real Claim Pre-Check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITEDHEALTHCARE_API_KEY}}'
  exposes:
  - type: rest
    namespace: provider-claims-rest
    port: 8080
    description: REST adapter for UnitedHealthcare Provider API — Claims. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/claims/v1/inquiry
      name: claims-v1-inquiry
      description: REST surface for claims-v1-inquiry.
      operations:
      - method: POST
        name: inquireclaim
        description: UnitedHealthcare Real Claim Inquiry
        call: provider-claims.inquireclaim
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/claims/v1/pre-check
      name: claims-v1-pre-check
      description: REST surface for claims-v1-pre-check.
      operations:
      - method: POST
        name: claimprecheck
        description: UnitedHealthcare Real Claim Pre-Check
        call: provider-claims.claimprecheck
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: provider-claims-mcp
    port: 9090
    transport: http
    description: MCP adapter for UnitedHealthcare Provider API — Claims. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: unitedhealthcare-real-claim-inquiry
      description: UnitedHealthcare Real Claim Inquiry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: provider-claims.inquireclaim
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: unitedhealthcare-real-claim-pre-check
      description: UnitedHealthcare Real Claim Pre-Check
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: provider-claims.claimprecheck
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
